name: CD — Build, Push & Deploy

# ============================================================
# SYNAPSE Continuous Deployment Pipeline
# ============================================================
# Triggers: push to main (after CI passes) + manual dispatch
#
# Flow:
#   1. Build multi-arch Docker images (linux/amd64 + linux/arm64)
#   2. Push to GitHub Container Registry (GHCR) with SHA + latest tags
#   3. SSH into EC2, pull new images, run migrations, reload services
#   4. Health check production URL
#   5. Notify (Slack / GitHub deployment status)
#
# Required GitHub Secrets:
#   EC2_HOST, EC2_USER, EC2_SSH_KEY
#   SLACK_WEBHOOK_URL (optional)
# ============================================================

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options: [production, staging]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false   # never cancel in-flight deploys

env:
  REGISTRY:   ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Build & push images ───────────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents:  read
      packages:  write
      id-token:  write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Image metadata ──────────────────────────────────────────────────
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/synapse-backend
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/synapse-frontend
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/synapse-ai-engine
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Backend ─────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    backend/Dockerfile
          target:  production
          platforms: linux/amd64,linux/arm64
          push:    true
          tags:    ${{ env.REGISTRY }}/${{ github.repository_owner }}/synapse-backend:${{ github.sha }},${{ env.REGISTRY }}/${{ github.repository_owner }}/synapse-backend:latest
          cache-from: type=gha,scope=backend-prod
          cache-to:   type=gha,scope=backend-prod,mode=max
          labels:  ${{ steps.meta.outputs.labels }}

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file:    frontend/Dockerfile
          target:  production
          platforms: linux/amd64,linux/arm64
          push:    true
          tags:    ${{ env.REGISTRY }}/${{ github.repository_owner }}/synapse-frontend:${{ github.sha }},${{ env.REGISTRY }}/${{ github.repository_owner }}/synapse-frontend:latest
          cache-from: type=gha,scope=frontend-prod
          cache-to:   type=gha,scope=frontend-prod,mode=max
          labels:  ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

      # ── AI Engine ────────────────────────────────────────────────────────
      - name: Build & push AI engine
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    ai_engine/Dockerfile
          platforms: linux/amd64,linux/arm64
          push:    true
          tags:    ${{ env.REGISTRY }}/${{ github.repository_owner }}/synapse-ai-engine:${{ github.sha }},${{ env.REGISTRY }}/${{ github.repository_owner }}/synapse-ai-engine:latest
          cache-from: type=gha,scope=ai-engine-prod
          cache-to:   type=gha,scope=ai-engine-prod,mode=max
          labels:  ${{ steps.meta.outputs.labels }}

  # ── Deploy to EC2 ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production (EC2)
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: production
      url:  ${{ secrets.PRODUCTION_URL }}
    permissions:
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token:       ${{ secrets.GITHUB_TOKEN }}
          environment: production

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          timeout:  300s
          script: |
            set -e
            cd /opt/synapse

            echo "=== Pulling latest images ==="
            export IMAGE_TAG=${{ github.sha }}
            export GITHUB_REPOSITORY=${{ github.repository }}
            docker compose -f docker-compose.prod.yml pull

            echo "=== Running database migrations ==="
            docker compose -f docker-compose.prod.yml run --rm backend \
              python manage.py migrate --noinput

            echo "=== Collecting static files ==="
            docker compose -f docker-compose.prod.yml run --rm backend \
              python manage.py collectstatic --noinput

            echo "=== Rolling restart (zero downtime) ==="
            docker compose -f docker-compose.prod.yml up -d \
              --remove-orphans \
              --no-deps \
              backend fastapi_ai frontend celery_worker celery_beat flower

            echo "=== Pruning old images ==="
            docker image prune -f --filter "until=72h"

            echo "=== Deploy complete ==="

      - name: Production health check
        run: |
          echo "Waiting 30s for services to stabilise..."
          sleep 30
          for i in 1 2 3 4 5; do
            if curl -sf ${{ secrets.PRODUCTION_URL }}/api/v1/health/; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts!"
          exit 1

      - name: Update deployment status (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token:         ${{ secrets.GITHUB_TOKEN }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state:         success
          environment-url: ${{ secrets.PRODUCTION_URL }}

      - name: Update deployment status (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token:         ${{ secrets.GITHUB_TOKEN }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state:         failure

      - name: Notify Slack — success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          fields: repo,message,commit,author,took
          text: "✅ SYNAPSE deployed to production — <${{ secrets.PRODUCTION_URL }}|view live>"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack — failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          fields: repo,message,commit,author,took
          text: "🚨 SYNAPSE deploy FAILED — check <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions>"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
