name: SYNAPSE CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ── Lint Backend ──────────────────────────────────────────
  lint-backend:
    name: Lint Python (black, isort, flake8, bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install lint tools
        run: pip install black isort flake8 bandit safety
      - name: black
        run: black --check backend/ scraper/ ai_engine/
      - name: isort
        run: isort --check-only --profile black backend/ scraper/ ai_engine/
      - name: flake8
        run: flake8 backend/ scraper/ ai_engine/ --max-line-length=88 --extend-ignore=E203,W503
      - name: bandit
        run: bandit -r backend/ ai_engine/ -c pyproject.toml
      - name: safety
        run: safety check -r backend/requirements.txt

  # ── Lint Frontend ─────────────────────────────────────────
  lint-frontend:
    name: Lint JavaScript/TypeScript (ESLint, Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: ESLint
        working-directory: frontend
        run: npm run lint
      - name: Prettier check
        working-directory: frontend
        run: npm run format:check

  # ── Test Backend ──────────────────────────────────────────
  test-backend:
    name: Test Django (pytest)
    runs-on: ubuntu-latest
    needs: lint-backend
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: synapse_test
          POSTGRES_USER: synapse_user
          POSTGRES_PASSWORD: synapse_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://synapse_user:synapse_pass@localhost:5432/synapse_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      SECRET_KEY: test-secret-key-for-ci-only
      DEBUG: 'True'
      GEMINI_API_KEY: test-fake-gemini-key-for-ci
      GEMINI_MODEL: gemini-flash-latest
      EMBEDDING_PROVIDER: local
      EMBEDDING_MODEL: all-MiniLM-L6-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt pytest pytest-django pytest-cov pytest-asyncio factory-boy faker responses freezegun
      - name: Run tests with coverage
        working-directory: backend
        run: pytest --cov=. --cov-report=xml --cov-report=term-missing -v
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: backend/coverage.xml
          flags: backend

  # ── Test Frontend ─────────────────────────────────────────
  test-frontend:
    name: Test Next.js (Jest + RTL)
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Run tests
        working-directory: frontend
        run: npm test -- --coverage --watchAll=false
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: frontend/coverage/lcov.info
          flags: frontend

  # ── Build Docker Images ───────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build AI engine image
        uses: docker/build-push-action@v5
        with:
          context: ./ai_engine
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
