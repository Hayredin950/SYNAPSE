# SYNAPSE Redis Configuration

# ── Network ──────────────────────────────────────────────────
# Bind to all interfaces so Docker healthcheck and other containers can reach it
bind 0.0.0.0
port 6379
protected-mode no

# ── Memory ───────────────────────────────────────────────────
maxmemory 512mb
maxmemory-policy allkeys-lru

# ── Persistence (RDB snapshots) ───────────────────────────────
save 900 1
save 300 10
save 60 10000

# ── AOF Persistence ───────────────────────────────────────────
appendonly yes
appendfsync everysec

# ── Logging ───────────────────────────────────────────────────
loglevel notice
