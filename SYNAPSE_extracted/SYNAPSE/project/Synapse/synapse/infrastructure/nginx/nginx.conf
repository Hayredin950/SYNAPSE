# ============================================================
# SYNAPSE — Nginx Production Config
# ============================================================
# Best practices:
#  ✓ TLS 1.2+ only (TLS 1.0/1.1 disabled)
#  ✓ OCSP stapling for faster TLS handshakes
#  ✓ Security headers (HSTS, CSP, X-Frame-Options, etc.)
#  ✓ Gzip + Brotli compression
#  ✓ Rate limiting (10 req/s per IP with burst)
#  ✓ Proxy buffering & timeouts tuned for Django/FastAPI
#  ✓ Static file serving with far-future cache headers
#  ✓ WebSocket support for streaming responses
# ============================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens      off;          # hide nginx version

    client_max_body_size  100M;
    client_body_timeout   60s;
    client_header_timeout 60s;
    send_timeout          60s;

    # ── Gzip compression ───────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m     rate=30r/m;
    limit_req_zone  $binary_remote_addr zone=auth:10m    rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=general:10m rate=60r/m;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # ── Upstream servers ───────────────────────────────────────────────────────
    upstream django_backend {
        server backend:8000;
        keepalive 32;
    }

    upstream fastapi_ai {
        server fastapi_ai:8001;
        keepalive 16;
    }

    upstream nextjs_frontend {
        server frontend:3000;
        keepalive 32;
    }

    # ── Include vhost configs ──────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
