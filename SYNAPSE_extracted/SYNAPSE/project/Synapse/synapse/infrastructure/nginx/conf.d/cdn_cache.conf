# ── TASK-507: CDN / Nginx caching strategy ─────────────────────────────────
# Aggressive caching for static assets, conservative for API responses.

# Proxy cache zone (shared memory)
proxy_cache_path /var/cache/nginx/synapse
    levels=1:2
    keys_zone=synapse_cache:20m
    max_size=2g
    inactive=60m
    use_temp_path=off;

# Cache key
proxy_cache_key "$scheme$request_method$host$request_uri$http_authorization";

# ── Static assets: 1 year ─────────────────────────────────────────────────────
location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
    proxy_pass http://frontend:3000;
    proxy_cache synapse_cache;
    proxy_cache_valid 200 365d;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Cache-Status $upstream_cache_status;
    gzip_static on;
    expires 365d;
}

# ── Next.js _next/static: immutable ──────────────────────────────────────────
location /_next/static/ {
    proxy_pass http://frontend:3000;
    proxy_cache synapse_cache;
    proxy_cache_valid 200 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Cache-Status $upstream_cache_status;
}

# ── API responses: short TTL + stale-while-revalidate ─────────────────────────
location /api/v1/trends/ {
    proxy_pass http://backend:8000;
    proxy_cache synapse_cache;
    proxy_cache_valid 200 5m;
    proxy_cache_use_stale error timeout updating http_500;
    add_header Cache-Control "public, s-maxage=300, stale-while-revalidate=60";
    add_header X-Cache-Status $upstream_cache_status;
}

location /api/v1/repos/trending-velocity/ {
    proxy_pass http://backend:8000;
    proxy_cache synapse_cache;
    proxy_cache_valid 200 10m;
    proxy_cache_use_stale error timeout updating http_500;
    add_header Cache-Control "public, s-maxage=600, stale-while-revalidate=120";
    add_header X-Cache-Status $upstream_cache_status;
}

# ── User-specific API: no cache ───────────────────────────────────────────────
location /api/v1/briefing/ {
    proxy_pass http://backend:8000;
    add_header Cache-Control "private, no-cache, no-store";
    add_header X-Cache-Status "BYPASS";
}

location /api/v1/users/ {
    proxy_pass http://backend:8000;
    add_header Cache-Control "private, no-cache";
}
