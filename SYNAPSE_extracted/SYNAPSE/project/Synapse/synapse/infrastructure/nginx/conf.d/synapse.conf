# ============================================================
# SYNAPSE — Virtual host config
# ============================================================

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen      80;
    server_name ${DOMAIN} www.${DOMAIN};
    return 301  https://$host$request_uri;
}

# ── HTTPS main server ──────────────────────────────────────────────────────────
server {
    listen              443 ssl http2;
    server_name         ${DOMAIN} www.${DOMAIN};

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header X-Frame-Options            "SAMEORIGIN"                                    always;
    add_header X-XSS-Protection           "1; mode=block"                                always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"     always;
    # SEC-12: CSP — 'unsafe-inline' for style-src is removed.
    # Next.js injects inline styles via CSS-in-JS; use 'unsafe-hashes' with
    # a nonce or hash-based allowlist instead.
    # For Next.js App Router, set `nonce` via middleware and pass it via
    # NEXT_PUBLIC_CSP_NONCE. The $request_id variable used here as a nonce
    # proxy — replace with your actual nonce generation mechanism.
    #
    # NOTE: If you rely on third-party widget styles (e.g. Stripe Elements,
    # Sentry feedback), add their origins explicitly instead of 'unsafe-inline'.
    add_header Content-Security-Policy
        "default-src 'self';
         script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;
         style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
         font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
         img-src 'self' data: https: blob:;
         connect-src 'self' wss: https:;
         object-src 'none';
         base-uri 'self';
         frame-ancestors 'none';
         upgrade-insecure-requests;"
        always;

    # ── Django REST API ───────────────────────────────────────────────────────
    location /api/ {
        limit_req  zone=api burst=20 nodelay;
        limit_conn perip 20;

        proxy_pass         http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;

        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;

        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 16k;
    }

    # ── Auth endpoints — stricter rate limit ──────────────────────────────────
    location /api/v1/auth/ {
        limit_req  zone=auth burst=5 nodelay;
        limit_conn perip 5;

        proxy_pass         http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Django Admin — restricted access ─────────────────────────────────────
    location /admin/ {
        limit_req  zone=auth burst=3 nodelay;

        # SECURITY: restrict admin to trusted IPs only.
        # Replace with your actual office/VPN CIDR blocks.
        # To allow all (NOT recommended for production): comment out allow/deny lines.
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;

        proxy_pass         http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── FastAPI AI Engine ─────────────────────────────────────────────────────
    location /ai/ {
        limit_req  zone=api burst=10 nodelay;

        # Strip /ai prefix before forwarding
        rewrite ^/ai/(.*)$ /$1 break;

        proxy_pass         http://fastapi_ai;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (for streaming responses)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout 300s;   # long timeout for AI generation
    }

    # ── Django static files (WhiteNoise handles these, but nginx is faster) ───
    location /static/ {
        alias /app/staticfiles/;
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        gzip_static on;
    }

    # ── User-uploaded media ───────────────────────────────────────────────────
    location /media/ {
        alias      /app/media/;
        expires    7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Next.js frontend ──────────────────────────────────────────────────────
    location / {
        limit_req  zone=general burst=30 nodelay;

        proxy_pass         http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket (Next.js HMR — not needed in prod but harmless)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Next.js static assets — aggressive caching ───────────────────────────
    location /_next/static/ {
        proxy_pass         http://nextjs_frontend;
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # ── Flower monitoring — internal only, basic auth required ───────────────
    location /flower/ {
        limit_req  zone=auth burst=5 nodelay;

        # SECURITY: restrict to internal network only
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;

        # Basic auth as second layer (set FLOWER_BASIC_AUTH in .env)
        auth_basic           "Flower Monitoring";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass         http://flower:5555/;
        proxy_http_version 1.1;
        proxy_set_header   Host     $host;
        proxy_set_header   X-Real-IP $remote_addr;
        rewrite            ^/flower/(.*)$ /$1 break;
    }
}
