# ============================================================
# SYNAPSE — Prometheus Scrape Config
# Phase 8.2 — Monitoring
# ============================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: synapse-production
    env:     production

# ── Alerting ──────────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

# ── Alert rules ───────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules/*.yml

# ── Scrape configs ────────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # Host system metrics (node_exporter)
  - job_name: node
    static_configs:
      - targets: [node_exporter:9100]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: ec2-production

  # Docker container metrics (cAdvisor)
  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]
    metric_relabel_configs:
      # Keep only SYNAPSE containers
      - source_labels: [container_label_com_docker_compose_project]
        regex: synapse.*
        action: keep

  # Django backend (django-prometheus)
  - job_name: django
    metrics_path: /metrics
    static_configs:
      - targets: [backend:8000]
    relabel_configs:
      - target_label: service
        replacement: django

  # FastAPI AI engine (prometheus_fastapi_instrumentator)
  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets: [fastapi_ai:8001]
    relabel_configs:
      - target_label: service
        replacement: fastapi-ai

  # Celery (via Flower metrics endpoint)
  - job_name: celery
    metrics_path: /metrics
    static_configs:
      - targets: [flower:5555]
    relabel_configs:
      - target_label: service
        replacement: celery

  # PostgreSQL (postgres_exporter)
  - job_name: postgres
    static_configs:
      - targets: [postgres_exporter:9187]
    relabel_configs:
      - target_label: service
        replacement: postgresql

  # Redis (redis_exporter)
  - job_name: redis
    static_configs:
      - targets: [redis_exporter:9121]
    relabel_configs:
      - target_label: service
        replacement: redis

  # Nginx (nginx-prometheus-exporter)
  - job_name: nginx
    static_configs:
      - targets: [nginx_exporter:9113]
    relabel_configs:
      - target_label: service
        replacement: nginx
