server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ── Docker container logs ──────────────────────────────────────────────────
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      # Use container name as the stream label
      - source_labels: [__meta_docker_container_name]
        target_label: container
        regex: /(.*)
        replacement: $1
      # Add compose project label
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project
      # Add compose service label
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      # Only scrape SYNAPSE containers
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        regex: synapse.*
        action: keep
    pipeline_stages:
      # Parse JSON log lines (structlog output)
      - json:
          expressions:
            level:   level
            event:   event
            logger:  logger
            request: request_id
      - labels:
          level:
          service:
      # Drop debug logs in production to save storage
      - drop:
          source:     level
          expression: debug
          drop_counter_reason: debug_log_dropped

  # ── Nginx access logs ──────────────────────────────────────────────────────
  - job_name: nginx_access
    static_configs:
      - targets: [localhost]
        labels:
          job:       nginx
          log_type:  access
          __path__: /var/log/nginx/access.log
    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>\S+) - (?P<remote_user>\S+) \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) \S+" (?P<status>\d+) (?P<bytes_sent>\d+)'
      - labels:
          method:
          status:
      - metrics:
          nginx_requests_total:
            type:        Counter
            description: Total Nginx requests
            source:      status
            config:
              action: inc

  # ── Nginx error logs ───────────────────────────────────────────────────────
  - job_name: nginx_error
    static_configs:
      - targets: [localhost]
        labels:
          job:       nginx
          log_type:  error
          __path__: /var/log/nginx/error.log
    pipeline_stages:
      - multiline:
          firstline: '^\d{4}/\d{2}/\d{2}'
