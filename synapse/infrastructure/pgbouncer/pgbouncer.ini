# ── TASK-506: pgBouncer connection pooling ────────────────────────────────────
# Sits between Django/AI engine and PostgreSQL.
# Mode: transaction pooling (safest for Django ORM + pgvector)
#
# Usage: pgbouncer /etc/pgbouncer/pgbouncer.ini
# Docker: add pgbouncer service to docker-compose.yml

[databases]
# Replace with your actual DB credentials
synapse = host=postgres port=5432 dbname=synapse

[pgbouncer]
# ── Network ──────────────────────────────────────────────────────────────────
listen_addr     = 0.0.0.0
listen_port     = 6432
unix_socket_dir = /var/run/postgresql

# ── Authentication ────────────────────────────────────────────────────────────
# SEC-09: scram-sha-256 is the modern standard (PostgreSQL 14+).
# md5 is deprecated and cryptographically weak — upgrade to scram-sha-256.
# Ensure userlist.txt contains scram-sha-256 hashed passwords (not md5).
# Generate with: psql -c "SELECT rolname, rolpassword FROM pg_authid WHERE rolname='synapse_user';"
auth_type       = scram-sha-256
auth_file       = /etc/pgbouncer/userlist.txt

# ── Pool settings ─────────────────────────────────────────────────────────────
pool_mode       = transaction    # transaction pooling — Django ORM compatible
# Max server connections (= PostgreSQL max_connections / num_services)
max_client_conn = 1000
default_pool_size = 25          # connections per (db, user) pair
min_pool_size   = 5
reserve_pool_size = 5
reserve_pool_timeout = 3.0

# ── Server settings ───────────────────────────────────────────────────────────
server_lifetime  = 3600         # recycle connections every hour
server_idle_timeout = 600       # close idle connections after 10 min
server_connect_timeout = 15
server_reset_query = DISCARD ALL

# ── Client settings ───────────────────────────────────────────────────────────
client_idle_timeout = 0         # never drop idle client connections
client_login_timeout = 15

# ── Stats & logging ───────────────────────────────────────────────────────────
stats_period    = 60
log_connections = 0
log_disconnections = 0
log_pooler_errors  = 1

# ── Admin ─────────────────────────────────────────────────────────────────────
admin_users = postgres
stats_users = postgres

# ── TLS (enable in production) ───────────────────────────────────────────────
# server_tls_sslmode = require
# server_tls_ca_file = /etc/ssl/certs/ca-certificates.crt
