# ============================================================
# SYNAPSE — Production Docker Compose
# ============================================================
# Industry best practices:
#  ✓ No source-code volume mounts (immutable image artefacts)
#  ✓ Secrets via env_file / Docker Secrets (never hardcoded)
#  ✓ Resource limits (CPU + memory) to prevent OOM/noisy-neighbour
#  ✓ Restart policy: always (recover from crashes)
#  ✓ healthcheck + depends_on condition: service_healthy
#  ✓ Overlay network (internal) — services not exposed unless needed
#  ✓ Named volumes with explicit driver
#  ✓ Nginx reverse proxy with SSL termination
#  ✓ Gunicorn (4 workers) + uvicorn (2 workers) for prod throughput
# ============================================================

version: '3.9'

x-backend-env: &backend-env
  DJANGO_SETTINGS_MODULE: config.settings.production
  DB_HOST:     postgres
  DB_PORT:     "5432"
  DB_NAME:     ${DB_NAME:-synapse_db}
  DB_USER:     ${DB_USER:-synapse_user}
  DB_PASSWORD: ${DB_PASSWORD}
  REDIS_URL:           redis://:${REDIS_PASSWORD}@redis:6379/0
  CELERY_BROKER_URL:   redis://:${REDIS_PASSWORD}@redis:6379/1
  PYTHONPATH:  /app
  PYTHONUNBUFFERED: "1"

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
    internal: true   # services on this network cannot reach the internet directly

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local
  nginx_logs:
    driver: local

services:

  # ── Nginx — reverse proxy + SSL termination ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: synapse_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      - nginx_logs:/var/log/nginx
      # SSL certs — mount from host (managed by Certbot / ACM)
      - ${SSL_CERT_PATH:-./infrastructure/nginx/certs}:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - frontend_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    container_name: synapse_postgres
    restart: always
    environment:
      POSTGRES_DB:       ${DB_NAME:-synapse_db}
      POSTGRES_USER:     ${DB_USER:-synapse_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-synapse_user} -d ${DB_NAME:-synapse_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # PostgreSQL tuning for production
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=512MB
        -c effective_cache_size=1536MB
        -c maintenance_work_mem=128MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=4MB
        -c log_min_duration_statement=1000
        -c log_connections=on

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: synapse_redis
    restart: always
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django Backend ────────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-hayrekhan750/synapse}/backend:${IMAGE_TAG:-latest}
    container_name: synapse_backend
    restart: always
    env_file: .env.prod
    environment:
      <<: *backend-env
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    networks:
      - backend_net
      - frontend_net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        gunicorn config.wsgi:application
          --bind 0.0.0.0:8000
          --workers ${GUNICORN_WORKERS:-4}
          --worker-class gthread
          --threads 2
          --timeout 120
          --keep-alive 5
          --max-requests 1000
          --max-requests-jitter 100
          --access-logfile -
          --error-logfile -
          --log-level info
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── FastAPI AI Engine ─────────────────────────────────────────────────────────
  fastapi_ai:
    image: ghcr.io/${GITHUB_REPOSITORY:-hayrekhan750/synapse}/ai-engine:${IMAGE_TAG:-latest}
    container_name: synapse_fastapi_ai
    restart: always
    env_file: .env.prod
    environment:
      <<: *backend-env
    networks:
      - backend_net
      - frontend_net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn ai_engine.main:app
        --host 0.0.0.0
        --port 8001
        --workers ${UVICORN_WORKERS:-2}
        --loop uvloop
        --access-log
        --log-level info
        --timeout-keep-alive 30
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-hayrekhan750/synapse}/frontend:${IMAGE_TAG:-latest}
    container_name: synapse_frontend
    restart: always
    env_file: .env.prod
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.synapse.app}
    networks:
      - frontend_net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  celery_worker:
    image: ghcr.io/${GITHUB_REPOSITORY:-hayrekhan750/synapse}/backend:${IMAGE_TAG:-latest}
    container_name: synapse_celery_worker
    restart: always
    env_file: .env.prod
    environment:
      <<: *backend-env
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A config worker
        --loglevel=info
        --concurrency=${CELERY_CONCURRENCY:-4}
        --max-tasks-per-child=1000
        --queues=documents,repositories,articles,papers,videos,automation,celery
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ── Celery Beat ───────────────────────────────────────────────────────────────
  celery_beat:
    image: ghcr.io/${GITHUB_REPOSITORY:-hayrekhan750/synapse}/backend:${IMAGE_TAG:-latest}
    container_name: synapse_celery_beat
    restart: always
    env_file: .env.prod
    environment:
      <<: *backend-env
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A config beat
        --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
        --max-interval 300

  # ── Flower — Celery monitoring UI ────────────────────────────────────────────
  flower:
    image: ghcr.io/${GITHUB_REPOSITORY:-hayrekhan750/synapse}/backend:${IMAGE_TAG:-latest}
    container_name: synapse_flower
    restart: always
    env_file: .env.prod
    environment:
      <<: *backend-env
      FLOWER_BASIC_AUTH: ${FLOWER_USER:-admin}:${FLOWER_PASSWORD}
    networks:
      - backend_net
      - frontend_net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A config flower
        --port=5555
        --broker=redis://:${REDIS_PASSWORD}@redis:6379/1
        --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD}
